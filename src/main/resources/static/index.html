<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>tecresearch AI - Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            overflow: hidden;
            color: #1f2937;
        }

        /* App Container */
        .app-container {
            display: flex;
            height: 100vh;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(0px);
        }

        /* Sidebar - History */
        .sidebar {
            width: 280px;
            background: rgba(255, 255, 255, 0.98);
            border-right: 1px solid rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 10;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo i {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-size: 1.8rem;
        }

        .new-chat-btn {
            width: 100%;
            padding: 0.75rem;
            margin-top: 1rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .new-chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .history-item {
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: rgba(102, 126, 234, 0.05);
        }

        .history-item:hover {
            background: rgba(102, 126, 234, 0.15);
            transform: translateX(4px);
        }

        .history-item.active {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
            border-left: 3px solid #667eea;
        }

        .history-item i {
            color: #667eea;
            font-size: 0.9rem;
        }

        .history-content {
            flex: 1;
            overflow: hidden;
        }

        .history-title {
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .history-date {
            font-size: 0.7rem;
            color: #6b7280;
        }

        /* Main Chat Area */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: white;
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #667eea;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            background: #f9fafb;
        }

        .message {
            margin-bottom: 1.5rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-content {
            display: flex;
            gap: 1rem;
            max-width: 85%;
        }

        .user-message {
            justify-content: flex-end;
        }

        .user-message .message-content {
            margin-left: auto;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .assistant-avatar {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .user-avatar {
            background: #e5e7eb;
            color: #4b5563;
        }

        .message-text {
            background: white;
            padding: 1rem;
            border-radius: 18px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            line-height: 1.6;
            word-wrap: break-word;
            flex: 1;
        }

        .user-message .message-text {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .message-text pre {
            background: #1f2937;
            color: #e5e7eb;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 0.5rem 0;
            position: relative;
        }

        .message-text code {
            font-family: 'Courier New', monospace;
            background: rgba(0, 0, 0, 0.05);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9em;
        }

        .copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            color: white;
        }

        .input-area {
            background: white;
            padding: 1rem 2rem;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
        }

        .input-container {
            display: flex;
            gap: 1rem;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            resize: none;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .send-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: flex;
            gap: 0.25rem;
            padding: 0.5rem;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: bounce 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                height: 100%;
                width: 280px;
                transition: left 0.3s ease;
            }

            .sidebar.open {
                left: 0;
            }

            .menu-toggle {
                display: block;
            }

            .message-content {
                max-width: 95%;
            }

            .chat-messages {
                padding: 1rem;
            }

            .input-area {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-microchip"></i>
                    <span>tecresearch AI</span>
                </div>
                <button class="new-chat-btn" id="newChatBtn">
                    <i class="fas fa-plus"></i>
                    New Chat
                </button>
            </div>
            <div class="history-list" id="historyList"></div>
        </div>

        <!-- Main Chat Area -->
        <div class="main-chat">
            <div class="chat-header">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div style="font-weight: 500;">AI Assistant</div>
                <div></div>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="input-area">
                <div class="input-container">
                    <textarea id="userInput" placeholder="Ask me anything... (Press Enter to send)" rows="1"></textarea>
                    <button class="send-btn" id="sendBtn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API Configuration
        const API_URL = 'https://ai.tecresearch.me/ai';
        
        // App State
        let currentSessionId = Date.now().toString();
        let sessions = [];
        let currentMessages = [];
        let isLoading = false;

        // Load history from localStorage
        function loadHistory() {
            const saved = localStorage.getItem('tecresearch_sessions');
            if (saved) {
                sessions = JSON.parse(saved);
            } else {
                // Create default session
                sessions = [{
                    id: currentSessionId,
                    title: 'New Conversation',
                    messages: [],
                    timestamp: Date.now()
                }];
                saveHistory();
            }
            
            // Set current session to most recent
            if (sessions.length > 0) {
                currentSessionId = sessions[sessions.length - 1].id;
                currentMessages = sessions.find(s => s.id === currentSessionId)?.messages || [];
            }
            
            renderHistory();
            renderMessages();
        }

        function saveHistory() {
            localStorage.setItem('tecresearch_sessions', JSON.stringify(sessions));
        }

        function saveCurrentSession() {
            const sessionIndex = sessions.findIndex(s => s.id === currentSessionId);
            if (sessionIndex !== -1) {
                sessions[sessionIndex].messages = currentMessages;
                sessions[sessionIndex].timestamp = Date.now();
                // Update title if first message exists
                if (currentMessages.length > 0 && sessions[sessionIndex].title === 'New Conversation') {
                    const firstMsg = currentMessages[0].content;
                    sessions[sessionIndex].title = firstMsg.length > 30 ? firstMsg.substring(0, 30) + '...' : firstMsg;
                }
                saveHistory();
            }
        }

        function createNewSession() {
            currentSessionId = Date.now().toString();
            currentMessages = [];
            sessions.unshift({
                id: currentSessionId,
                title: 'New Conversation',
                messages: [],
                timestamp: Date.now()
            });
            saveHistory();
            renderHistory();
            renderMessages();
            closeSidebar();
        }

        function switchSession(sessionId) {
            currentSessionId = sessionId;
            currentMessages = sessions.find(s => s.id === sessionId)?.messages || [];
            renderMessages();
            renderHistory();
            closeSidebar();
        }

        function deleteSession(sessionId, event) {
            event.stopPropagation();
            sessions = sessions.filter(s => s.id !== sessionId);
            if (sessions.length === 0) {
                createNewSession();
            } else if (currentSessionId === sessionId) {
                currentSessionId = sessions[0].id;
                currentMessages = sessions[0].messages;
                renderMessages();
            }
            saveHistory();
            renderHistory();
        }

        function renderHistory() {
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = sessions.map(session => `
                <div class="history-item ${session.id === currentSessionId ? 'active' : ''}" onclick="switchSession('${session.id}')">
                    <i class="fas fa-comment"></i>
                    <div class="history-content">
                        <div class="history-title">${escapeHtml(session.title)}</div>
                        <div class="history-date">${new Date(session.timestamp).toLocaleDateString()}</div>
                    </div>
                    <i class="fas fa-trash" onclick="deleteSession('${session.id}', event)" style="color: #ef4444; cursor: pointer;"></i>
                </div>
            `).join('');
        }

        function renderMessages() {
            const container = document.getElementById('chatMessages');
            if (currentMessages.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 3rem; color: #6b7280;">
                        <i class="fas fa-robot" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                        <h3>Welcome to tecresearch AI!</h3>
                        <p>Ask me anything, and I'll help you find answers.</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = currentMessages.map(msg => `
                <div class="message ${msg.role === 'user' ? 'user-message' : 'assistant-message'}">
                    <div class="message-content">
                        <div class="message-avatar ${msg.role === 'user' ? 'user-avatar' : 'assistant-avatar'}">
                            <i class="fas ${msg.role === 'user' ? 'fa-user' : 'fa-robot'}"></i>
                        </div>
                        <div class="message-text">${formatMessage(msg.content)}</div>
                    </div>
                </div>
            `).join('');
            
            container.scrollTop = container.scrollHeight;
        }

        function formatMessage(content) {
            // Format code blocks
            let formatted = content.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
                return `<pre><code class="language-${lang}">${escapeHtml(code)}</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></pre>`;
            });
            
            // Format inline code
            formatted = formatted.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            // Format paragraphs
            formatted = formatted.split('\n\n').map(para => `<p>${para}</p>`).join('');
            
            // Format line breaks
            formatted = formatted.replace(/\n/g, '<br>');
            
            return formatted;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.copyCode = function(btn) {
            const pre = btn.parentElement;
            const code = pre.querySelector('code');
            navigator.clipboard.writeText(code.textContent);
            btn.textContent = 'Copied!';
            setTimeout(() => {
                btn.textContent = 'Copy';
            }, 2000);
        };

        async function sendMessage() {
            if (isLoading) return;
            
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;
            
            // Add user message
            currentMessages.push({ role: 'user', content: message });
            renderMessages();
            saveCurrentSession();
            
            input.value = '';
            input.style.height = 'auto';
            
            // Add typing indicator
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant-message';
            typingDiv.innerHTML = `
                <div class="message-content">
                    <div class="message-avatar assistant-avatar">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="message-text">
                        <div class="typing-indicator">
                            <span></span><span></span><span></span>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('chatMessages').appendChild(typingDiv);
            document.getElementById('chatMessages').scrollTop = document.getElementById('chatMessages').scrollHeight;
            
            isLoading = true;
            
            try {
                // Prepare context - last 5 messages for token efficiency
                const contextMessages = currentMessages.slice(-5).map(m => ({
                    role: m.role,
                    content: m.content
                }));
                
                // Build prompt with context
                const prompt = contextMessages.map(m => `${m.role === 'user' ? 'User' : 'Assistant'}: ${m.content}`).join('\n') + `\nAssistant: `;
                
                // Call API with redirect handling
                const response = await fetch(`${API_URL}?q=${encodeURIComponent(prompt)}`, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                    },
                    redirect: 'follow'
                });
                
                let aiResponse;
                if (response.ok) {
                    aiResponse = await response.text();
                } else {
                    // Handle redirects and errors
                    const finalUrl = response.url;
                    const retryResponse = await fetch(finalUrl);
                    aiResponse = await retryResponse.text();
                }
                
                // Remove typing indicator
                typingDiv.remove();
                
                // Add AI response
                currentMessages.push({ role: 'assistant', content: aiResponse });
                renderMessages();
                saveCurrentSession();
                
            } catch (error) {
                console.error('Error:', error);
                typingDiv.remove();
                currentMessages.push({ role: 'assistant', content: 'Sorry, I encountered an error. Please try again.' });
                renderMessages();
                saveCurrentSession();
            } finally {
                isLoading = false;
            }
        }

        // Auto-resize textarea
        const textarea = document.getElementById('userInput');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
        
        textarea.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('newChatBtn').addEventListener('click', createNewSession);
        
        // Mobile menu toggle
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
        }
        
        document.getElementById('menuToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
        });
        
        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('sidebar');
            const menuBtn = document.getElementById('menuToggle');
            if (window.innerWidth <= 768 && sidebar.classList.contains('open')) {
                if (!sidebar.contains(e.target) && !menuBtn.contains(e.target)) {
                    closeSidebar();
                }
            }
        });
        
        // Initialize app
        loadHistory();
    </script>
</body>
</html>
