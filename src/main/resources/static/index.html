<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Tecresearch AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh;
            overflow: hidden;
            color: #e2e8f0;
        }

        /* Glassmorphism Effect */
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .app-container {
            display: flex;
            height: 100vh;
            background: rgba(15, 23, 42, 0.3);
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            z-index: 10;
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 600;
            color: #e2e8f0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo i {
            font-size: 1.5rem;
            color: #60a5fa;
        }

        .new-chat-btn {
            width: 100%;
            padding: 0.75rem;
            margin-top: 1rem;
            background: rgba(96, 165, 250, 0.2);
            border: 1px solid rgba(96, 165, 250, 0.3);
            border-radius: 12px;
            color: #e2e8f0;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .new-chat-btn:hover {
            background: rgba(96, 165, 250, 0.3);
            border-color: rgba(96, 165, 250, 0.5);
            transform: translateY(-1px);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .history-item {
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
        }

        .history-item:hover {
            background: rgba(96, 165, 250, 0.15);
            transform: translateX(4px);
        }

        .history-item.active {
            background: rgba(96, 165, 250, 0.2);
            border-left: 3px solid #60a5fa;
        }

        .history-item i {
            color: #60a5fa;
            font-size: 0.9rem;
        }

        .history-content {
            flex: 1;
            overflow: hidden;
        }

        .history-title {
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #e2e8f0;
        }

        .history-date {
            font-size: 0.7rem;
            color: #94a3b8;
        }

        .delete-btn {
            color: #ef4444;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .history-item:hover .delete-btn {
            opacity: 1;
        }

        /* Main Chat Area */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #e2e8f0;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            background: rgba(15, 23, 42, 0.5);
        }

        .message {
            margin-bottom: 1.5rem;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-content {
            display: flex;
            gap: 1rem;
            max-width: 85%;
        }

        .user-message {
            justify-content: flex-end;
        }

        .user-message .message-content {
            margin-left: auto;
        }

        .message-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 0.875rem;
        }

        .assistant-avatar {
            background: rgba(96, 165, 250, 0.2);
            border: 1px solid rgba(96, 165, 250, 0.3);
            color: #60a5fa;
        }

        .user-avatar {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #94a3b8;
        }

        .message-text {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(8px);
            padding: 1rem;
            border-radius: 18px;
            line-height: 1.6;
            word-wrap: break-word;
            flex: 1;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .user-message .message-text {
            background: rgba(96, 165, 250, 0.15);
            border: 1px solid rgba(96, 165, 250, 0.2);
        }

        .message-text pre {
            background: rgba(0, 0, 0, 0.3);
            color: #e2e8f0;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            margin: 0.5rem 0;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .message-text code {
            font-family: 'Courier New', monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9em;
            color: #60a5fa;
        }

        .copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            color: #e2e8f0;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .input-area {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-container {
            display: flex;
            gap: 1rem;
            align-items: flex-end;
        }

        textarea {
            flex: 1;
            padding: 0.75rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            resize: none;
            font-size: 0.95rem;
            color: #e2e8f0;
            transition: all 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: #60a5fa;
            background: rgba(15, 23, 42, 0.8);
        }

        textarea::placeholder {
            color: #64748b;
        }

        .send-btn {
            background: rgba(96, 165, 250, 0.2);
            border: 1px solid rgba(96, 165, 250, 0.3);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            color: #60a5fa;
            cursor: pointer;
            transition: all 0.2s;
        }

        .send-btn:hover:not(:disabled) {
            background: rgba(96, 165, 250, 0.3);
            transform: scale(1.05);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: flex;
            gap: 0.25rem;
            padding: 0.5rem;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #60a5fa;
            animation: bounce 1.4s infinite;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        /* Markdown Styling */
        .message-text p {
            margin-bottom: 0.75rem;
        }

        .message-text p:last-child {
            margin-bottom: 0;
        }

        .message-text ul, .message-text ol {
            margin: 0.5rem 0;
            padding-left: 1.5rem;
        }

        .message-text li {
            margin: 0.25rem 0;
        }

        .message-text h1, .message-text h2, .message-text h3 {
            margin: 1rem 0 0.5rem 0;
            color: #60a5fa;
        }

        .message-text strong {
            font-weight: 600;
            color: #60a5fa;
        }

        .message-text a {
            color: #60a5fa;
            text-decoration: none;
        }

        .message-text a:hover {
            text-decoration: underline;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: -280px;
                height: 100%;
                width: 280px;
                transition: left 0.3s ease;
            }

            .sidebar.open {
                left: 0;
                box-shadow: 2px 0 10px rgba(0, 0, 0, 0.3);
            }

            .menu-toggle {
                display: block;
            }

            .message-content {
                max-width: 95%;
            }

            .chat-messages {
                padding: 1rem;
            }

            .input-area {
                padding: 1rem;
            }
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(96, 165, 250, 0.3);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(96, 165, 250, 0.5);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fas fa-microchip"></i>
                    <span>Tecresearch AI Assistant</span>
                </div>
                <button class="new-chat-btn" id="newChatBtn">
                    <i class="fas fa-plus"></i>
                    New Chat
                </button>
            </div>
            <div class="history-list" id="historyList"></div>
        </div>

        <!-- Main Chat Area -->
        <div class="main-chat">
            <div class="chat-header">
                <button class="menu-toggle" id="menuToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div style="font-weight: 500; color: #e2e8f0;">Tecresearch AI Assistant</div>
                <div style="width: 24px;"></div>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="input-area">
                <div class="input-container">
                    <textarea id="userInput" placeholder="Ask me anything..." rows="1"></textarea>
                    <button class="send-btn" id="sendBtn">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API Configuration - Using HTTPS
        const API_URL = 'https://ai.tecresearch.me/ai';
        
        // App State
        let currentSessionId = Date.now().toString();
        let sessions = [];
        let currentMessages = [];
        let isLoading = false;

        // Load history from localStorage
        function loadHistory() {
            const saved = localStorage.getItem('tecresearch_sessions');
            if (saved) {
                sessions = JSON.parse(saved);
            } else {
                sessions = [{
                    id: currentSessionId,
                    title: 'New Conversation',
                    messages: [],
                    timestamp: Date.now()
                }];
                saveHistory();
            }
            
            if (sessions.length > 0) {
                currentSessionId = sessions[sessions.length - 1].id;
                currentMessages = sessions.find(s => s.id === currentSessionId)?.messages || [];
            }
            
            renderHistory();
            renderMessages();
        }

        function saveHistory() {
            localStorage.setItem('tecresearch_sessions', JSON.stringify(sessions));
        }

        function saveCurrentSession() {
            const sessionIndex = sessions.findIndex(s => s.id === currentSessionId);
            if (sessionIndex !== -1) {
                sessions[sessionIndex].messages = [...currentMessages];
                sessions[sessionIndex].timestamp = Date.now();
                if (currentMessages.length > 0 && sessions[sessionIndex].title === 'New Conversation') {
                    const firstMsg = currentMessages[0].content;
                    sessions[sessionIndex].title = firstMsg.length > 30 ? firstMsg.substring(0, 30) + '...' : firstMsg;
                }
                saveHistory();
            }
        }

        function createNewSession() {
            currentSessionId = Date.now().toString();
            currentMessages = [];
            sessions.unshift({
                id: currentSessionId,
                title: 'New Conversation',
                messages: [],
                timestamp: Date.now()
            });
            saveHistory();
            renderHistory();
            renderMessages();
            closeSidebar();
        }

        function switchSession(sessionId) {
            currentSessionId = sessionId;
            currentMessages = sessions.find(s => s.id === sessionId)?.messages || [];
            renderMessages();
            renderHistory();
            closeSidebar();
        }

        function deleteSession(sessionId, event) {
            event.stopPropagation();
            sessions = sessions.filter(s => s.id !== sessionId);
            if (sessions.length === 0) {
                createNewSession();
            } else if (currentSessionId === sessionId) {
                currentSessionId = sessions[0].id;
                currentMessages = sessions[0].messages;
                renderMessages();
            }
            saveHistory();
            renderHistory();
        }

        function renderHistory() {
            const historyList = document.getElementById('historyList');
            if (sessions.length === 0) {
                historyList.innerHTML = '<div style="text-align: center; padding: 1rem; color: #64748b;">No conversations yet</div>';
                return;
            }
            
            historyList.innerHTML = sessions.map(session => `
                <div class="history-item ${session.id === currentSessionId ? 'active' : ''}" onclick="switchSession('${session.id}')">
                    <i class="fas fa-comment"></i>
                    <div class="history-content">
                        <div class="history-title">${escapeHtml(session.title)}</div>
                        <div class="history-date">${new Date(session.timestamp).toLocaleDateString()}</div>
                    </div>
                    <i class="fas fa-trash delete-btn" onclick="deleteSession('${session.id}', event)"></i>
                </div>
            `).join('');
        }

        function renderMessages() {
            const container = document.getElementById('chatMessages');
            if (currentMessages.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 3rem; color: #64748b;">
                        <i class="fas fa-microchip" style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; color: #60a5fa;"></i>
                        <h3 style="margin-bottom: 0.5rem; color: #e2e8f0;">Welcome to Tecresearch AI</h3>
                        <p>Your intelligent assistant, ready to help with any question.</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = currentMessages.map(msg => `
                <div class="message ${msg.role === 'user' ? 'user-message' : 'assistant-message'}">
                    <div class="message-content">
                        <div class="message-avatar ${msg.role === 'user' ? 'user-avatar' : 'assistant-avatar'}">
                            <i class="fas ${msg.role === 'user' ? 'fa-user' : 'fa-microchip'}"></i>
                        </div>
                        <div class="message-text">${formatMessage(msg.content)}</div>
                    </div>
                </div>
            `).join('');
            
            container.scrollTop = container.scrollHeight;
        }

        function formatMessage(content) {
            let formatted = escapeHtml(content);
            
            // Format code blocks
            formatted = formatted.replace(/```(\w*)\n([\s\S]*?)```/g, (match, lang, code) => {
                return `<pre><code class="language-${lang}">${code.trim()}</code><button class="copy-btn" onclick="copyCode(this)">Copy</button></pre>`;
            });
            
            // Format inline code
            formatted = formatted.replace(/`([^`]+)`/g, '<code>$1</code>');
            
            // Format bold text
            formatted = formatted.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            
            // Format italic text
            formatted = formatted.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            
            // Format links
            formatted = formatted.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
            
            // Format paragraphs
            const paragraphs = formatted.split('\n\n');
            formatted = paragraphs.map(para => {
                if (para.trim().startsWith('<pre>') || para.trim().startsWith('<ul>') || para.trim().startsWith('<ol>')) {
                    return para;
                }
                return `<p>${para.replace(/\n/g, '<br>')}</p>`;
            }).join('');
            
            return formatted;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.copyCode = function(btn) {
            const pre = btn.parentElement;
            const code = pre.querySelector('code');
            const text = code.textContent;
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btn.textContent;
                btn.textContent = '✓ Copied!';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            });
        };

        async function sendMessage() {
            if (isLoading) return;
            
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            if (!message) return;
            
            currentMessages.push({ role: 'user', content: message });
            renderMessages();
            saveCurrentSession();
            
            input.value = '';
            input.style.height = 'auto';
            
            const messagesContainer = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant-message';
            typingDiv.id = 'typing-indicator';
            typingDiv.innerHTML = `
                <div class="message-content">
                    <div class="message-avatar assistant-avatar">
                        <i class="fas fa-microchip"></i>
                    </div>
                    <div class="message-text">
                        <div class="typing-indicator">
                            <span></span><span></span><span></span>
                        </div>
                    </div>
                </div>
            `;
            messagesContainer.appendChild(typingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            
            isLoading = true;
            document.getElementById('sendBtn').disabled = true;
            
            try {
                let prompt = '';
                for (let i = 0; i < currentMessages.length - 1; i++) {
                    const msg = currentMessages[i];
                    if (msg.role === 'user') {
                        prompt += `User: ${msg.content}\n`;
                    } else {
                        prompt += `Assistant: ${msg.content}\n`;
                    }
                }
                prompt += `Assistant: `;
                
                const response = await fetch(`${API_URL}?q=${encodeURIComponent(prompt)}`, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                    }
                });
                
                let aiResponseText = '';
                
                if (response.ok) {
                    const data = await response.json();
                    aiResponseText = data.result || data.response || 'I understand. How can I help you further?';
                } else {
                    const textResponse = await response.text();
                    try {
                        const jsonData = JSON.parse(textResponse);
                        aiResponseText = jsonData.result || jsonData.response || textResponse;
                    } catch {
                        aiResponseText = textResponse;
                    }
                }
                
                const typingElement = document.getElementById('typing-indicator');
                if (typingElement) typingElement.remove();
                
                currentMessages.push({ role: 'assistant', content: aiResponseText });
                renderMessages();
                saveCurrentSession();
                
            } catch (error) {
                console.error('Error:', error);
                const typingElement = document.getElementById('typing-indicator');
                if (typingElement) typingElement.remove();
                
                currentMessages.push({ role: 'assistant', content: 'I apologize, but I encountered an error. Please check your connection and try again.' });
                renderMessages();
                saveCurrentSession();
            } finally {
                isLoading = false;
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('userInput').focus();
            }
        }

        const textarea = document.getElementById('userInput');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
        
        textarea.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('newChatBtn').addEventListener('click', createNewSession);
        
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
        }
        
        document.getElementById('menuToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('open');
        });
        
        document.addEventListener('click', (e) => {
            const sidebar = document.getElementById('sidebar');
            const menuBtn = document.getElementById('menuToggle');
            if (window.innerWidth <= 768 && sidebar.classList.contains('open')) {
                if (!sidebar.contains(e.target) && !menuBtn.contains(e.target)) {
                    closeSidebar();
                }
            }
        });
        
        loadHistory();
    </script>
</body>
</html>
